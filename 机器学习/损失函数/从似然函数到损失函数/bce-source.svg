<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 260" role="img" aria-labelledby="title desc">
  <title id="title">BCE 的似然来源</title>
  <desc id="desc">二分类交叉熵来自 Bernoulli 分布的负对数似然。</desc>
  <rect width="980" height="260" fill="#fbfaf7"/>
  <g font-family="PingFang SC, Microsoft YaHei, Arial" text-anchor="middle">
    <rect x="70" y="78" width="180" height="86" rx="10" fill="#eef5f3" stroke="#89aaa5" stroke-width="2"/>
    <rect x="310" y="78" width="180" height="86" rx="10" fill="#fff1e6" stroke="#d5a375" stroke-width="2"/>
    <rect x="550" y="78" width="180" height="86" rx="10" fill="#eef5f3" stroke="#89aaa5" stroke-width="2"/>
    <rect x="790" y="78" width="120" height="86" rx="10" fill="#f7e9ef" stroke="#c696a8" stroke-width="2"/>
    <text x="160" y="112" font-size="20" font-weight="700" fill="#263c3a">Bernoulli</text>
    <text x="160" y="142" font-size="18" fill="#263c3a">y ∈ {0,1}</text>
    <text x="400" y="112" font-size="20" font-weight="700" fill="#5a3e2c">二分类似然</text>
    <text x="400" y="142" font-size="18" fill="#5a3e2c">p^y(1-p)^(1-y)</text>
    <text x="640" y="112" font-size="20" font-weight="700" fill="#263c3a">负对数似然</text>
    <text x="640" y="142" font-size="18" fill="#263c3a">-log P(y|x)</text>
    <text x="850" y="128" font-size="22" font-weight="700" fill="#6a4051">BCE</text>
    <g stroke="#c77b43" stroke-width="3" fill="none" marker-end="url(#arrow)">
      <path d="M254 121 H304"/>
      <path d="M494 121 H544"/>
      <path d="M734 121 H784"/>
    </g>
  </g>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#c77b43"/>
    </marker>
  </defs>
</svg>
