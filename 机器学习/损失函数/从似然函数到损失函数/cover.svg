<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">似然函数封面示意图</title>
  <desc id="desc">一排硬币和纸上的似然曲线，表示用抛硬币理解似然函数。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7ead8"/>
      <stop offset="0.55" stop-color="#eef3ec"/>
      <stop offset="1" stop-color="#dce8ef"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#7c6f61" flood-opacity="0.22"/>
    </filter>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <rect x="170" y="118" width="940" height="486" rx="28" fill="#fffaf1" filter="url(#shadow)"/>
  <path d="M250 500 C370 480, 430 410, 510 330 C600 238, 710 180, 810 244 C900 302, 968 420, 1040 466" fill="none" stroke="#5d8b84" stroke-width="12" stroke-linecap="round"/>
  <path d="M250 500 C370 480, 430 410, 510 330 C600 238, 710 180, 810 244 C900 302, 968 420, 1040 466" fill="none" stroke="#c88356" stroke-width="4" stroke-linecap="round" opacity="0.85"/>
  <circle cx="705" cy="210" r="12" fill="#c88356"/>
  <line x1="705" y1="210" x2="705" y2="522" stroke="#c88356" stroke-width="3" stroke-dasharray="10 12" opacity="0.65"/>
  <g transform="translate(260 430)">
    <g fill="#e0b85e" stroke="#a9782c" stroke-width="5">
      <circle cx="0" cy="0" r="48"/>
      <circle cx="88" cy="20" r="48"/>
      <circle cx="176" cy="0" r="48"/>
      <circle cx="264" cy="20" r="48"/>
    </g>
    <g fill="none" stroke="#f8df92" stroke-width="4" opacity="0.8">
      <circle cx="0" cy="0" r="32"/>
      <circle cx="88" cy="20" r="32"/>
      <circle cx="176" cy="0" r="32"/>
      <circle cx="264" cy="20" r="32"/>
    </g>
  </g>
</svg>
