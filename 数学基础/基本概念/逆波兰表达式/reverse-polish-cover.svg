<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">逆波兰表达式封面</title>
  <desc id="desc">中缀表达式转换为逆波兰表达式，并通过栈计算出结果。</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f7fbff"/>
      <stop offset="0.54" stop-color="#f4f0e6"/>
      <stop offset="1" stop-color="#e8f4ec"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#2c3e50" flood-opacity="0.16"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="1340" cy="180" r="96" fill="#f4c95d" opacity="0.28"/>
  <circle cx="210" cy="730" r="150" fill="#4f8f8b" opacity="0.12"/>
  <path d="M0 760 C300 670 540 840 840 742 S1280 610 1600 704 L1600 900 L0 900 Z" fill="#d7e7df" opacity="0.58"/>

  <g filter="url(#shadow)">
    <rect x="170" y="110" width="1260" height="660" rx="28" fill="#ffffff"/>
  </g>

  <text x="800" y="220" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif" font-size="86" font-weight="700" fill="#263238">逆波兰表达式</text>
  <text x="800" y="274" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" font-weight="600" fill="#5d6f73">Reverse Polish Notation</text>

  <g transform="translate(250 345)">
    <rect x="0" y="0" width="480" height="130" rx="18" fill="#eef6fb" stroke="#9cc3d5" stroke-width="3"/>
    <text x="240" y="58" text-anchor="middle" font-family="Menlo, Consolas, monospace" font-size="40" font-weight="700" fill="#31556b">(1 + 2) * (3 + 4)</text>
    <text x="240" y="104" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif" font-size="26" fill="#607d8b">中缀表达式</text>
  </g>

  <g transform="translate(780 375)">
    <path d="M0 34 H168" fill="none" stroke="#d97941" stroke-width="10" stroke-linecap="round"/>
    <path d="M168 34 L128 10 M168 34 L128 58" fill="none" stroke="#d97941" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <g transform="translate(980 345)">
    <rect x="0" y="0" width="370" height="130" rx="18" fill="#fff5e8" stroke="#e5a05f" stroke-width="3"/>
    <text x="185" y="58" text-anchor="middle" font-family="Menlo, Consolas, monospace" font-size="40" font-weight="700" fill="#77512c">1 2 + 3 4 + *</text>
    <text x="185" y="104" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif" font-size="26" fill="#8a6545">后缀表达式</text>
  </g>

  <g transform="translate(315 560)">
    <rect x="0" y="0" width="115" height="72" rx="12" fill="#eaf4ef" stroke="#4f8f8b" stroke-width="3"/>
    <rect x="132" y="0" width="115" height="72" rx="12" fill="#eaf4ef" stroke="#4f8f8b" stroke-width="3"/>
    <rect x="264" y="0" width="115" height="72" rx="12" fill="#eaf4ef" stroke="#4f8f8b" stroke-width="3"/>
    <text x="58" y="47" text-anchor="middle" font-family="Menlo, Consolas, monospace" font-size="32" font-weight="700" fill="#2f5f5b">3</text>
    <text x="190" y="47" text-anchor="middle" font-family="Menlo, Consolas, monospace" font-size="32" font-weight="700" fill="#2f5f5b">7</text>
    <text x="322" y="47" text-anchor="middle" font-family="Menlo, Consolas, monospace" font-size="32" font-weight="700" fill="#2f5f5b">*</text>
    <path d="M410 36 H555" fill="none" stroke="#4f8f8b" stroke-width="7" stroke-linecap="round"/>
    <path d="M555 36 L525 18 M555 36 L525 54" fill="none" stroke="#4f8f8b" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <g transform="translate(940 545)">
    <text x="110" y="-22" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif" font-size="30" font-weight="600" fill="#455a64">栈计算</text>
    <rect x="0" y="142" width="220" height="60" rx="12" fill="#d97941"/>
    <rect x="0" y="72" width="220" height="60" rx="12" fill="#f4c95d"/>
    <rect x="0" y="2" width="220" height="60" rx="12" fill="#88b7a8"/>
    <text x="110" y="42" text-anchor="middle" font-family="Menlo, Consolas, monospace" font-size="32" font-weight="700" fill="#ffffff">21</text>
    <text x="110" y="112" text-anchor="middle" font-family="Menlo, Consolas, monospace" font-size="32" font-weight="700" fill="#4c3f22">7</text>
    <text x="110" y="182" text-anchor="middle" font-family="Menlo, Consolas, monospace" font-size="32" font-weight="700" fill="#ffffff">3</text>
  </g>

</svg>
