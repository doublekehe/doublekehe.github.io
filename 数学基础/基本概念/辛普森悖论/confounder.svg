  <line x1="398" y1="124" x2="266" y2="256" stroke="#65777a" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="504" y1="124" x2="636" y2="256" stroke="#65777a" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="336" y1="295" x2="564" y2="295" stroke="#65777a" stroke-width="3" marker-end="url(#arrow)"/>
