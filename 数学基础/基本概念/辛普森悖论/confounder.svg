  <text x="608" y="184" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif" font-size="20" fill="#5d6b6e">影响结果</text>
  <text x="450" y="354" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif" font-size="20" fill="#5d6b6e">如果不控制病情，方案与结果的关系会被混杂</text>
