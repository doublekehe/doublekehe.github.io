<svg xmlns="http://www.w3.org/2000/svg" width="900" height="420" viewBox="0 0 900 420" role="img" aria-label="混杂变量示意图">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#65777a"/>
    </marker>
  </defs>
  <rect width="900" height="420" fill="#ffffff"/>
  <rect x="334" y="46" width="232" height="78" rx="14" fill="#f5efe3" stroke="#c9b99e" stroke-width="2"/>
  <text x="450" y="94" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif" font-size="28" font-weight="700" fill="#263238">病情严重程度</text>
  <rect x="116" y="256" width="220" height="78" rx="14" fill="#eaf2f8" stroke="#8db4d6" stroke-width="2"/>
