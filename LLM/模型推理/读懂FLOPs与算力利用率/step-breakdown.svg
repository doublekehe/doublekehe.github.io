<svg xmlns="http://www.w3.org/2000/svg" width="1300" height="520" viewBox="0 0 1300 520">
  <rect width="1300" height="520" fill="#f8faf9"/>
  <text x="650" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#18332d">一次训练 step 的时间花在哪里</text>
  <g font-family="Arial, sans-serif" text-anchor="middle">
    <rect x="80" y="170" width="150" height="150" rx="6" fill="#d9dfdd"/>
    <text x="155" y="235" font-size="24" font-weight="700" fill="#46534f">数据等待</text>
    <text x="155" y="278" font-size="20" fill="#46534f">CPU / I/O</text>
    <rect x="230" y="170" width="380" height="150" rx="6" fill="#4f86c6"/>
    <text x="420" y="235" font-size="25" font-weight="700" fill="#ffffff">矩阵计算</text>
    <text x="420" y="278" font-size="20" fill="#ffffff">Tensor Core</text>
    <rect x="610" y="170" width="185" height="150" rx="6" fill="#d59b2a"/>
    <text x="702" y="235" font-size="24" font-weight="700" fill="#ffffff">访存操作</text>
    <text x="702" y="278" font-size="20" fill="#ffffff">Memory</text>
    <rect x="795" y="170" width="270" height="150" rx="6" fill="#55a06f"/>
    <text x="930" y="235" font-size="24" font-weight="700" fill="#ffffff">多卡通信</text>
    <text x="930" y="278" font-size="20" fill="#ffffff">Collective</text>
    <rect x="1065" y="170" width="155" height="150" rx="6" fill="#d98762"/>
    <text x="1142" y="235" font-size="24" font-weight="700" fill="#ffffff">同步等待</text>
    <text x="1142" y="278" font-size="20" fill="#ffffff">Barrier</text>
    <line x1="80" y1="370" x2="1220" y2="370" stroke="#52615d" stroke-width="4"/>
    <polygon points="1210,360 1235,370 1210,380" fill="#52615d"/>
    <text x="650" y="420" font-size="23" fill="#18332d">step time</text>
    <text x="650" y="470" font-size="21" fill="#52615d">GPU-Util 可能覆盖多个阶段，MFU 的分子只计算模型定义中的有效 FLOPs</text>
  </g>
</svg>
