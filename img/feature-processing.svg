<svg viewBox="0 0 720 240" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <path d="M0,0 L10,3.5 L0,7 z" fill="#333" />
    </marker>
  </defs>
  <!-- Left: Categorical -->
  <rect x="60" y="20" width="220" height="60" rx="8" fill="#f0f7ff" stroke="#4a90e2" stroke-width="2" />
  <text x="170" y="45" text-anchor="middle" font-size="16" fill="#0b4f9a">离散型特征</text>
  <text x="170" y="62" text-anchor="middle" font-size="12" fill="#333">One-Hot → Embedding</text>

  <!-- Right: Continuous -->
  <rect x="440" y="20" width="220" height="60" rx="8" fill="#f9f7ef" stroke="#f5a623" stroke-width="2" />
  <text x="550" y="45" text-anchor="middle" font-size="16" fill="#b36a00">连续型特征</text>
  <text x="550" y="62" text-anchor="middle" font-size="12" fill="#333">归一化 / 分桶 → Embedding</text>

  <!-- Bottom: Model Input -->
  <rect x="250" y="140" width="220" height="60" rx="8" fill="#eefaf1" stroke="#2aa14b" stroke-width="2" />
  <text x="360" y="170" text-anchor="middle" font-size="16" fill="#1b6b3a">输入模型</text>
  <text x="360" y="188" text-anchor="middle" font-size="12" fill="#333">(DNN / LR / Tree 等)</text>

  <!-- Arrows -->
  <line x1="170" y1="80" x2="360" y2="140" stroke="#333" stroke-width="2" marker-end="url(#arrow)" />
  <line x1="550" y1="80" x2="360" y2="140" stroke="#333" stroke-width="2" marker-end="url(#arrow)" />
</svg>