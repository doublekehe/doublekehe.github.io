<svg width="980" height="520" viewBox="0 0 980 520" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">FFN 与 1x1 卷积等价示意图</title>
  <desc id="desc">1x1 卷积在每个位置上混合通道，不混合相邻位置</desc>
  <rect width="980" height="520" fill="#ffffff"/>
  <text x="490" y="48" text-anchor="middle" font-family="Arial, 'PingFang SC', sans-serif" font-size="30" font-weight="700" fill="#263642">FFN = 逐位置的 1x1 通道变换</text>

  <g transform="translate(92 112)" font-family="Arial, 'PingFang SC', sans-serif">
    <rect x="0" y="0" width="172" height="270" rx="14" fill="#eff6ff" stroke="#6b9bd6" stroke-width="2"/>
    <text x="86" y="36" text-anchor="middle" font-size="20" fill="#1f4d7a">输入位置</text>
    <g fill="#dbeafe" stroke="#6b9bd6" stroke-width="2">
      <rect x="40" y="68" width="92" height="32" rx="6"/>
      <rect x="40" y="114" width="92" height="32" rx="6"/>
      <rect x="40" y="160" width="92" height="32" rx="6"/>
      <rect x="40" y="206" width="92" height="32" rx="6"/>
    </g>
    <text x="86" y="300" text-anchor="middle" font-size="18" fill="#52616f">通道: d_model</text>
  </g>

  <g transform="translate(390 168)" font-family="Arial, 'PingFang SC', sans-serif">
    <rect x="0" y="0" width="200" height="116" rx="16" fill="#fff7d6" stroke="#d59d25" stroke-width="2"/>
    <text x="100" y="48" text-anchor="middle" font-size="22" font-weight="700" fill="#76520f">Conv1d</text>
    <text x="100" y="80" text-anchor="middle" font-size="19" fill="#76520f">kernel size = 1</text>
  </g>

  <g transform="translate(690 112)" font-family="Arial, 'PingFang SC', sans-serif">
    <rect x="0" y="0" width="172" height="270" rx="14" fill="#ecfdf3" stroke="#56a87a" stroke-width="2"/>
    <text x="86" y="36" text-anchor="middle" font-size="20" fill="#24613c">输出位置</text>
    <g fill="#d9f4e6" stroke="#56a87a" stroke-width="2">
      <rect x="32" y="68" width="108" height="32" rx="6"/>
      <rect x="32" y="114" width="108" height="32" rx="6"/>
      <rect x="32" y="160" width="108" height="32" rx="6"/>
      <rect x="32" y="206" width="108" height="32" rx="6"/>
    </g>
    <text x="86" y="300" text-anchor="middle" font-size="18" fill="#52616f">通道: d_ff</text>
  </g>

  <path d="M278 226 L374 226" stroke="#52616f" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M590 226 L674 226" stroke="#52616f" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M366 211 L386 226 L366 241" stroke="#52616f" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M666 211 L686 226 L666 241" stroke="#52616f" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <g font-family="Arial, 'PingFang SC', sans-serif" font-size="20" fill="#263642">
    <text x="490" y="418" text-anchor="middle">只混合同一位置的通道</text>
    <text x="490" y="452" text-anchor="middle">不读取相邻 token</text>
  </g>
</svg>
