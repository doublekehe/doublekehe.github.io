<svg width="1280" height="720" viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Transformer FFN 与 MLP 封面</title>
  <desc id="desc">四个 token 分别通过共享 FFN，输出四个 token，并说明 FFN 是逐位置 MLP 与 1x1 卷积视角</desc>
  <rect width="1280" height="720" fill="#f6f1e8"/>
  <rect x="72" y="70" width="1136" height="580" rx="26" fill="#fffdf8" stroke="#d8d0bf" stroke-width="3"/>

  <g font-family="Arial, 'PingFang SC', sans-serif">
    <text x="118" y="150" font-size="58" font-weight="700" fill="#21313f">Transformer FFN</text>
  </g>

  <g font-family="Arial, 'PingFang SC', sans-serif" font-size="22" fill="#52616f">
    <text x="177" y="270" text-anchor="middle">tokens</text>
    <text x="640" y="270" text-anchor="middle">shared FFN</text>
    <text x="1038" y="270" text-anchor="middle">tokens</text>
  </g>

  <g transform="translate(118 306)" font-family="Arial, sans-serif">
