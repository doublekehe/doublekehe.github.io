    <rect x="36" y="148" width="184" height="42" rx="9" fill="#fde68a" stroke="#d49b22" stroke-width="2"/>
    <text x="128" y="56" text-anchor="middle" font-size="22" font-weight="700" fill="#76520f">Linear</text>
    <text x="128" y="116" text-anchor="middle" font-size="22" font-weight="700" fill="#76520f">GeLU</text>
    <text x="128" y="176" text-anchor="middle" font-size="22" font-weight="700" fill="#76520f">Linear</text>
    <text x="128" y="214" text-anchor="middle" font-size="18" fill="#8a6519">同一组参数 · 逐位置共享</text>
  </g>

