    <text x="59" y="111" text-anchor="middle" font-size="23" fill="#1f4d7a">x2</text>
    <text x="59" y="185" text-anchor="middle" font-size="23" fill="#1f4d7a">x3</text>
    <text x="59" y="259" text-anchor="middle" font-size="23" fill="#1f4d7a">x4</text>
  </g>

  <g transform="translate(512 322)" font-family="Arial, 'PingFang SC', sans-serif">
    <rect x="0" y="0" width="256" height="238" rx="18" fill="#fff7d6" stroke="#d49b22" stroke-width="3"/>
    <rect x="36" y="28" width="184" height="42" rx="9" fill="#fde68a" stroke="#d49b22" stroke-width="2"/>
